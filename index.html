<style>
/* ===== RESET & VARIABLES ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
--fire:#C62828;--dark-red:#B71C1C;--orange:#E65100;--gold:#FFB300;
--dark:#1A1A2E;--cream:#FFF3E0;--wa:#25D366;
--sh:0 8px 32px rgba(0,0,0,.12);--sh-lg:0 16px 48px rgba(0,0,0,.18);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Poppins',sans-serif;color:#333;background:#fff;overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
.ctn{max-width:1140px;margin:0 auto;padding:0 24px}

/* ===== LOADER ===== */
.loader{position:fixed;inset:0;background:var(--dark);z-index:99999;display:flex;align-items:center;justify-content:center;transition:opacity .6s,visibility .6s}
.loader.done{opacity:0;visibility:hidden;pointer-events:none;display:none}
.loader-logo{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);animation:loaderPulse 1s ease infinite;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(255,179,0,.3)}
.loader-logo img{width:70px;height:70px;border-radius:50%;object-fit:cover}
@keyframes loaderPulse{0%,100%{transform:scale(1);box-shadow:0 0 20px rgba(255,179,0,.3)}50%{transform:scale(1.08);box-shadow:0 0 50px rgba(255,179,0,.5)}}

/* ===== NAVBAR ===== */
.nav{position:fixed;top:0;left:0;right:0;z-index:5000;padding:14px 0;transition:all .35s}
.nav.scrolled{background:rgba(26,26,46,.97);backdrop-filter:blur(12px);padding:8px 0;box-shadow:0 2px 20px rgba(0,0,0,.3)}
.nav-inner{display:flex;justify-content:space-between;align-items:center;max-width:1140px;margin:0 auto;padding:0 24px}
.nav-brand{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--gold);line-height:1.1}
.nav-brand small{display:block;font-family:'Poppins',sans-serif;font-size:10px;font-weight:400;color:rgba(255,255,255,.6);letter-spacing:3px;text-transform:uppercase}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{color:rgba(255,255,255,.7);font-size:13px;font-weight:500;letter-spacing:.5px;transition:color .3s}
.nav-links a:hover{color:var(--gold)}
.nav-cta{background:var(--wa);color:#fff!important;padding:9px 20px;border-radius:30px;font-weight:600;font-size:13px;transition:transform .2s,box-shadow .2s}
.nav-cta:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(37,211,102,.35)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{width:24px;height:2px;background:var(--gold);transition:.3s;border-radius:2px}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* ===== MOBILE NAV ===== */
@media(max-width:768px){
.nav-links{position:fixed;top:0;right:-100%;width:75%;max-width:300px;height:100vh;background:var(--dark);flex-direction:column;justify-content:center;gap:32px;padding:40px;transition:right .4s cubic-bezier(.25,.8,.25,1);box-shadow:-8px 0 40px rgba(0,0,0,.4)}
.nav-links.open{right:0}
.nav-links a{font-size:18px;color:rgba(255,255,255,.85)}
.hamburger{display:flex}
}

/* ===== HERO ===== */
.hero{min-height:100vh;background:linear-gradient(160deg,rgba(10,10,26,.92) 0%,rgba(26,26,46,.88) 30%,rgba(26,13,13,.9) 60%,rgba(15,10,5,.92) 100%),url('https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=1400&h=800&fit=crop&q=80') center/cover no-repeat;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;text-align:center}
.hero-bg{position:absolute;inset:0;overflow:hidden}
.hero-bg::before{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(198,40,40,.15),transparent 65%);top:-150px;right:-150px;animation:heroGlow 6s ease infinite alternate}
.hero-bg::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(255,179,0,.08),transparent 65%);bottom:-100px;left:-100px;animation:heroGlow 8s ease infinite alternate-reverse}
@keyframes heroGlow{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.15) translate(20px,-20px)}}

/* Fire particles */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:0;animation:particleRise linear infinite}
.particle:nth-child(1){width:4px;height:4px;background:#C62828;left:10%;animation-duration:8s;animation-delay:0s}
.particle:nth-child(2){width:3px;height:3px;background:#FFB300;left:20%;animation-duration:10s;animation-delay:1s}
.particle:nth-child(3){width:5px;height:5px;background:#E65100;left:35%;animation-duration:9s;animation-delay:2s}
.particle:nth-child(4){width:3px;height:3px;background:#C62828;left:50%;animation-duration:11s;animation-delay:.5s}
.particle:nth-child(5){width:4px;height:4px;background:#FFB300;left:65%;animation-duration:8.5s;animation-delay:3s}
.particle:nth-child(6){width:3px;height:3px;background:#E65100;left:78%;animation-duration:10s;animation-delay:1.5s}
.particle:nth-child(7){width:5px;height:5px;background:#FFB300;left:88%;animation-duration:9s;animation-delay:4s}
.particle:nth-child(8){width:2px;height:2px;background:#C62828;left:42%;animation-duration:12s;animation-delay:2.5s}
.particle:nth-child(9){width:4px;height:4px;background:#E65100;left:5%;animation-duration:7s;animation-delay:5s}
.particle:nth-child(10){width:3px;height:3px;background:#FFB300;left:92%;animation-duration:9.5s;animation-delay:0.8s}
.particle:nth-child(11){width:2px;height:2px;background:#C62828;left:55%;animation-duration:11s;animation-delay:3.5s}
.particle:nth-child(12){width:4px;height:4px;background:#FFB300;left:72%;animation-duration:8s;animation-delay:1.2s}
@keyframes particleRise{0%{bottom:-10px;opacity:0;transform:translateX(0)}15%{opacity:.7}50%{opacity:.4;transform:translateX(30px)}85%{opacity:.1}100%{bottom:110%;opacity:0;transform:translateX(-20px)}}

.hero-content{position:relative;z-index:2;padding:40px 20px}
.hero-logo-wrap{width:130px;height:130px;margin:0 auto 32px;border-radius:50%;border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px rgba(255,179,0,.2),inset 0 0 30px rgba(255,179,0,.05);animation:logoFloat 4s ease infinite}
.hero-logo-wrap img{width:105px;height:105px;border-radius:50%;object-fit:cover}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(3rem,8vw,6rem);font-weight:900;color:var(--gold);line-height:1;letter-spacing:3px;text-shadow:0 4px 30px rgba(255,179,0,.2);margin-bottom:4px}
.hero-biryani{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,4vw,2.5rem);color:var(--cream);font-weight:600;margin-bottom:16px}
.hero-tagline{font-size:clamp(14px,2vw,18px);color:rgba(255,243,224,.7);letter-spacing:6px;text-transform:uppercase;font-weight:300;margin-bottom:40px;overflow:hidden}
.hero-tagline span{display:inline-block;animation:tagReveal 1.2s cubic-bezier(.25,.8,.25,1) forwards;animation-delay:.8s;opacity:0;transform:translateY(20px)}
@keyframes tagReveal{to{opacity:1;transform:translateY(0)}}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:50px;font-size:15px;font-weight:600;font-family:'Poppins',sans-serif;cursor:pointer;border:none;transition:all .3s;letter-spacing:.3px}
.btn-wa{background:var(--wa);color:#fff;box-shadow:0 4px 20px rgba(37,211,102,.3)}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(37,211,102,.4)}
.btn-outline{background:transparent;color:var(--gold);border:2px solid var(--gold)}
.btn-outline:hover{background:var(--gold);color:var(--dark);transform:translateY(-2px)}
.btn-fire{background:linear-gradient(135deg,var(--fire),var(--dark-red));color:#fff;box-shadow:0 4px 20px rgba(198,40,40,.3)}
.btn-fire:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(198,40,40,.4)}
.scroll-hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,243,224,.4);font-size:12px;letter-spacing:2px;text-align:center}
.scroll-hint::after{content:'';display:block;width:1px;height:40px;background:linear-gradient(to bottom,rgba(255,179,0,.4),transparent);margin:8px auto 0;animation:scrollBounce 2s ease infinite}
@keyframes scrollBounce{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(12px);opacity:1}}

/* ===== OFFER STRIP ===== */
.offer-strip{background:linear-gradient(90deg,var(--dark-red),var(--fire),var(--orange));padding:12px 0;overflow:hidden;white-space:nowrap}
.offer-track{display:inline-flex;animation:marquee 22s linear infinite}
.offer-track span{display:inline-block;padding:0 60px;color:#fff;font-size:14px;font-weight:600;letter-spacing:.5px}
.offer-track span b{color:var(--gold)}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ===== SECTION UTILITIES ===== */
.sec{padding:90px 0}
.sec-dark{background:var(--dark);color:#fff}
.sec-cream{background:var(--cream)}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,42px);font-weight:800;text-align:center;margin-bottom:12px}
.sec-sub{text-align:center;color:#888;font-size:15px;margin-bottom:50px;max-width:560px;margin-left:auto;margin-right:auto}
.sec-dark .sec-sub{color:rgba(255,255,255,.5)}

/* Scroll animations */
.reveal{opacity:0;transform:translateY(40px);transition:opacity .7s cubic-bezier(.25,.8,.25,1),transform .7s cubic-bezier(.25,.8,.25,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity .7s,transform .7s}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity .7s,transform .7s}
.reveal-right.visible{opacity:1;transform:translateX(0)}

/* ===== WHY SECTION ===== */
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:28px}
.why-card{background:#fff;border-radius:16px;padding:36px 28px;text-align:center;box-shadow:var(--sh);transition:transform .3s,box-shadow .3s;border:1px solid rgba(0,0,0,.04)}
.why-card:hover{transform:translateY(-6px) scale(1.02);box-shadow:var(--sh-lg)}
.why-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.why-icon.ic1{background:linear-gradient(135deg,#fce4ec,#ffcdd2);color:var(--fire)}
.why-icon.ic2{background:linear-gradient(135deg,#fff3e0,#ffe0b2);color:var(--orange)}
.why-icon.ic3{background:linear-gradient(135deg,#fff8e1,#ffecb3);color:#F57F17}
.why-icon.ic4{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);color:#2E7D32}
.why-card h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:8px;color:var(--dark)}
.why-card p{font-size:14px;color:#777;line-height:1.6}

/* ===== MENU ===== */
.menu-tabs{display:flex;justify-content:center;gap:12px;margin-bottom:40px;flex-wrap:wrap}
.menu-tab{padding:10px 24px;border-radius:30px;font-size:14px;font-weight:600;cursor:pointer;border:2px solid #e0e0e0;background:#fff;color:#666;transition:all .3s}
.menu-tab:hover{border-color:var(--fire);color:var(--fire)}
.menu-tab.active{background:var(--fire);color:#fff;border-color:var(--fire);box-shadow:0 4px 16px rgba(198,40,40,.25)}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.menu-panel{display:none;animation:fadeTab .4s ease}
.menu-panel.active{display:block}
@keyframes fadeTab{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.menu-item{background:#fff;border-radius:14px;padding:16px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04);transition:transform .25s,box-shadow .25s;position:relative;overflow:hidden}
.menu-item:hover{transform:translateY(-3px);box-shadow:var(--sh)}
.menu-item-img{width:80px;height:80px;border-radius:12px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.menu-item-left{flex:1;min-width:0}
.menu-item-name{font-weight:700;font-size:15px;color:var(--dark);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:9px;padding:3px 8px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.badge-best{background:#FFF3E0;color:var(--orange)}
.badge-prem{background:#FCE4EC;color:var(--fire)}
.badge-new{background:#E8F5E9;color:#2E7D32}
.badge-spicy{background:#FBE9E7;color:#BF360C}
.badge-special{background:#EDE7F6;color:#4527A0}
.badge-nv{background:#FFEBEE;color:var(--fire);font-size:8px;padding:2px 6px}
.badge-veg{background:#E8F5E9;color:#2E7D32;font-size:8px;padding:2px 6px}
.menu-item-price{margin-top:6px;font-size:18px;font-weight:800;color:var(--fire)}
.menu-item-price small{font-size:12px;font-weight:500;color:#999;margin-left:6px}
.menu-item-right{display:flex;align-items:center;gap:0;margin-left:16px}
.qty-wrap{display:flex;align-items:center;gap:0;border:2px solid #eee;border-radius:10px;overflow:hidden}
.qty-btn{width:34px;height:34px;border:none;background:#fafafa;font-size:18px;font-weight:700;cursor:pointer;color:var(--fire);transition:background .2s;display:flex;align-items:center;justify-content:center;font-family:'Poppins',sans-serif}
.qty-btn:hover{background:#ffebee}
.qty-val{width:32px;text-align:center;font-size:14px;font-weight:700;color:var(--dark);background:#fff}
.add-btn{padding:9px 18px;border-radius:10px;border:2px solid var(--fire);background:#fff;color:var(--fire);font-size:13px;font-weight:700;cursor:pointer;transition:all .25s;font-family:'Poppins',sans-serif}
.add-btn:hover{background:var(--fire);color:#fff}

/* ===== COMBOS ===== */
.combos-sec{background:linear-gradient(160deg,#0a0a1a,#1a0d0d,var(--dark));position:relative;overflow:hidden}
.combos-sec::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1' fill='rgba(255,179,0,.04)'/%3E%3C/svg%3E");pointer-events:none}
.combos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
.combo-card{background:rgba(255,255,255,.04);backdrop-filter:blur(8px);border:1px solid rgba(255,179,0,.12);border-radius:18px;padding:0;position:relative;overflow:hidden;transition:transform .3s,border-color .3s
.combo-img{width:100%;height:180px;object-fit:cover;display:block}
.combo-card-body{padding:24px 24px 28px}
.combo-card:hover{transform:translateY(-4px);border-color:rgba(255,179,0,.3)}
.combo-badge{position:absolute;top:16px;right:16px;background:var(--gold);color:var(--dark);font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:.5px}
.combo-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:10px}
.combo-desc{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:16px}
.combo-pricing{display:flex;align-items:baseline;gap:12px;margin-bottom:6px}
.combo-price{font-size:32px;font-weight:800;color:#fff}
.combo-old{font-size:16px;color:rgba(255,255,255,.35);text-decoration:line-through}
.combo-save{color:var(--wa);font-size:13px;font-weight:700;margin-bottom:20px}
.combo-order{display:inline-flex;align-items:center;gap:8px;background:var(--wa);color:#fff;padding:11px 24px;border-radius:30px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:transform .2s,box-shadow .2s;font-family:'Poppins',sans-serif}
.combo-order:hover{transform:scale(1.04);box-shadow:0 4px 20px rgba(37,211,102,.3)}

/* Counter stats */
.stats-row{display:flex;justify-content:center;gap:48px;margin-top:60px;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:42px;font-weight:900;color:var(--gold)}
.stat-label{font-size:13px;color:rgba(255,255,255,.45);margin-top:4px}

/* ===== DIRECT ORDER BANNER ===== */
.direct-banner{background:linear-gradient(135deg,#1B5E20,#2E7D32,#43A047);padding:60px 0;position:relative;overflow:hidden}
.direct-banner::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='.5' fill='rgba(255,255,255,.05)'/%3E%3C/svg%3E");pointer-events:none}
.direct-inner{text-align:center;position:relative;z-index:1}
.direct-inner h2{font-family:'Playfair Display',serif;font-size:clamp(26px,4vw,38px);font-weight:800;color:#fff;margin-bottom:24px}
.direct-inner h2 em{color:var(--gold);font-style:normal}
.direct-perks{display:flex;justify-content:center;gap:36px;flex-wrap:wrap;margin-bottom:32px}
.direct-perk{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.9);font-size:14px;font-weight:500}
.direct-perk .dp-icon{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}

/* ===== REVIEWS ===== */
.reviews-wrap{max-width:700px;margin:0 auto;position:relative;overflow:hidden}
.reviews-track{display:flex;transition:transform .5s cubic-bezier(.25,.8,.25,1)}
.review-slide{min-width:100%;padding:0 20px}
.review-card{background:#fff;border-radius:18px;padding:40px 36px;box-shadow:var(--sh);text-align:center;border:1px solid rgba(0,0,0,.04)}
.review-stars{color:var(--gold);font-size:22px;letter-spacing:4px;margin-bottom:16px}
.review-text{font-size:16px;line-height:1.8;color:#555;margin-bottom:20px;font-style:italic}
.review-author{font-weight:700;color:var(--dark);font-size:14px}

.review-dot{width:10px;height:10px;border-radius:50%;background:#ddd;cursor:pointer;transition:all .3s;border:none}
.review-dot.active{background:var(--fire);transform:scale(1.3)}
.review-arrows{display:flex;justify-content:center;gap:16px;margin-top:16px}
.review-arrow{width:40px;height:40px;border-radius:50%;border:2px solid #ddd;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#666;transition:all .3s}
.review-arrow:hover{border-color:var(--fire);color:var(--fire)}

/* ===== LOCATION ===== */
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start}

.loc-map{border-radius:18px;overflow:hidden;box-shadow:var(--sh);height:350px}
.loc-map iframe{width:100%;height:100%;border:none}
.loc-info h3{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--dark);margin-bottom:20px}
.loc-row{display:flex;gap:14px;margin-bottom:18px;align-items:flex-start}
.loc-icon{width:40px;height:40px;border-radius:12px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.loc-detail{font-size:14px;color:#666;line-height:1.6}
.loc-detail strong{color:var(--dark);display:block;font-size:13px;margin-bottom:2px}
.loc-badges{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.loc-badge{padding:8px 16px;border-radius:10px;font-size:12px;font-weight:600;background:#fff;border:1px solid #e0e0e0;color:#555}

/* ===== FINAL CTA ===== */
.final-cta{background:linear-gradient(160deg,#0a0a1a,var(--dark),#1a0d0d);padding:80px 0;text-align:center;position:relative;overflow:hidden}
.final-cta::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(198,40,40,.1),transparent 65%);top:-150px;right:-100px}
.final-cta h2{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,44px);font-weight:800;color:var(--gold);margin-bottom:12px}
.final-cta p{color:rgba(255,255,255,.5);font-size:15px;margin-bottom:30px}
.final-phone{font-family:'Playfair Display',serif;font-size:clamp(32px,6vw,52px);font-weight:900;color:#fff;margin-bottom:32px;letter-spacing:3px}
.final-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}

/* ===== FOOTER ===== */
.footer{background:#0a0a1a;padding:50px 0 24px;color:rgba(255,255,255,.4)}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;margin-bottom:40px}
@media(max-width:768px){.footer-grid{grid-template-columns:1fr}}
.footer-brand{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--gold);margin-bottom:8px}
.footer-tagline{font-size:13px;color:rgba(255,255,255,.3);margin-bottom:16px}
.footer-desc{font-size:13px;line-height:1.7;color:rgba(255,255,255,.35)}
.footer h4{color:var(--gold);font-size:14px;font-weight:700;margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
.footer ul{list-style:none}
.footer li{margin-bottom:10px}
.footer li a{font-size:13px;color:rgba(255,255,255,.4);transition:color .3s}
.footer li a:hover{color:var(--gold)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.06);padding-top:20px;text-align:center;font-size:12px}

/* ===== FLOATING BTNS ===== */
.float-btns{position:fixed;bottom:24px;right:24px;z-index:4000;display:flex;flex-direction:column;gap:12px}
.float-btn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.2);transition:transform .3s}
.float-btn:hover{transform:scale(1.1)}
.float-wa{background:var(--wa);color:#fff;animation:pulse 2s ease infinite}
.float-call{background:var(--gold);color:var(--dark)}
@keyframes pulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.3)}50%{box-shadow:0 4px 40px rgba(37,211,102,.6)}}

/* ===== CART ===== */
.cart-float{position:fixed;bottom:24px;right:92px;z-index:4000;width:56px;height:56px;border-radius:50%;background:var(--fire);color:#fff;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(198,40,40,.3);transition:transform .3s}
.cart-float:hover{transform:scale(1.1)}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--dark);font-size:11px;font-weight:800;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--fire)}
.cart-badge:empty{display:none}
.cart-panel{position:fixed;top:0;right:-420px;width:400px;max-width:90vw;height:100vh;background:#fff;z-index:6000;box-shadow:-8px 0 40px rgba(0,0,0,.15);transition:right .4s cubic-bezier(.25,.8,.25,1);display:flex;flex-direction:column}
.cart-panel.open{right:0}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:5500;opacity:0;visibility:hidden;transition:all .3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-header{padding:20px 24px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.cart-header h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--dark)}
.cart-close{background:none;border:none;font-size:24px;cursor:pointer;color:#999;padding:4px}
.cart-body{flex:1;overflow-y:auto;padding:20px 24px}
.cart-empty{text-align:center;padding:40px 0;color:#aaa;font-size:14px}
.cart-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid #f5f5f5}
.cart-item-info{flex:1}
.cart-item-name{font-weight:600;font-size:14px;color:var(--dark)}
.cart-item-price{font-size:13px;color:var(--fire);font-weight:700;margin-top:2px}
.cart-item-qty{display:flex;align-items:center;gap:0;border:1px solid #eee;border-radius:8px;overflow:hidden}
.cart-item-qty button{width:30px;height:30px;border:none;background:#fafafa;font-size:16px;font-weight:700;cursor:pointer;color:var(--fire);font-family:'Poppins',sans-serif}
.cart-item-qty span{width:28px;text-align:center;font-size:13px;font-weight:700}
.cart-footer{padding:20px 24px;border-top:1px solid #eee}
.cart-total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:var(--dark);margin-bottom:16px}
.cart-checkout{width:100%;padding:14px;border-radius:14px;border:none;background:var(--wa);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.cart-checkout:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(37,211,102,.3)}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
.menu-grid{grid-template-columns:1fr}
.combos-grid{grid-template-columns:1fr}
.stats-row{gap:28px}
.stat-num{font-size:32px}
.hero-btns .btn{padding:12px 24px;font-size:13px}
.direct-perks{gap:16px}
.why-grid{grid-template-columns:1fr 1fr}
.menu-item-img{width:64px;height:64px;border-radius:10px}
.menu-item{padding:12px;gap:12px}
.combo-img{height:150px}
}
@media(max-width:400px){.why-grid{grid-template-columns:1fr}}
</style>
</head>
